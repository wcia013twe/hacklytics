version: '3.8'

services:
  # PostgreSQL with pgvector extension - Vector storage for protocols and incident history
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hacklytics_postgres
    environment:
      POSTGRES_USER: hacklytics
      POSTGRES_PASSWORD: hacklytics_dev
      POSTGRES_DB: hacklytics_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rag_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacklytics -d hacklytics_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Actian VectorAI DB - gRPC-based vector storage for protocols and incident history
  # COMMENTED OUT - Using PostgreSQL with pgvector instead
  # vectoraidb:
  #   image: williamimoh/actian-vectorai-db:1.0b  # Public image from DockerHub
  #   platform: linux/amd64   # Required on macOS with Apple Silicon
  #   container_name: hacklytics_vectoraidb
  #   ports:
  #     - "50051:50051"  # gRPC port (NOT PostgreSQL 5432)
  #   volumes:
  #     - actian_data:/data  # Collections and logs are persisted under /data
  #   networks:
  #     - rag_network
  #   restart: unless-stopped
  #   stop_grace_period: 2m  # Allow graceful shutdown for data persistence
  #   healthcheck:
  #     # VectorAI DB doesn't have built-in health probe, use bash TCP connection test
  #     # Using bash TCP redirect (works without nc/netcat in minimal containers)
  #     test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/50051' || exit 1"]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 120s  # Extended for amd64 emulation on Apple Silicon (much slower startup)
  #   # Resource limits to prevent runaway consumption
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '2.0'
  #         memory: 2G
  #       reservations:
  #         cpus: '0.5'
  #         memory: 512M

  # Redis Cache Layer - 3-layer semantic caching (94-95% hit rate)
  redis:
    image: redis:7-alpine
    container_name: hacklytics_redis
    ports:
      - "6379:6379"
    networks:
      - rag_network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # RAG Service - Embedding, retrieval, synthesis, incident logging
  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: hacklytics_rag
    ports:
      - "8001:8001"
    environment:
      # PostgreSQL connection settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: hacklytics
      POSTGRES_PASSWORD: hacklytics_dev
      POSTGRES_DB: hacklytics_rag
      # Actian settings (COMMENTED OUT - using PostgreSQL instead)
      # ACTIAN_HOST: host.docker.internal
      # ACTIAN_PORT: 50051
      REDIS_URL: redis://redis:6379  # Redis cache layer
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      BATCH_FLUSH_INTERVAL: ${BATCH_FLUSH_INTERVAL:-2.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag_network
    volumes:
      # Removed :ro flag - PYTHONDONTWRITEBYTECODE in Dockerfile prevents .pyc writes anyway
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - model_cache:/root/.cache/torch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # Higher for ML model
        reservations:
          cpus: '0.5'
          memory: 1G

  # Ingest Service - ZeroMQ subscriber, temporal buffer, WebSocket publisher
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: hacklytics_ingest
    ports:
      - "8000:8000"
      - "5555:5555"
    environment:
      ZMQ_BIND_ADDRESS: ${ZMQ_BIND_ADDRESS:-tcp://*:5555}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://rag:8001}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-8000}
      BUFFER_WINDOW_SECONDS: ${BUFFER_WINDOW_SECONDS:-10.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      rag:
        condition: service_healthy
    networks:
      - rag_network
    volumes:
      # Removed :ro flag - PYTHONDONTWRITEBYTECODE in Dockerfile prevents .pyc writes anyway
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Test Runner - Runs test profiles 1-7 inside containerized environment
  test:
    build:
      context: .
      dockerfile: Dockerfile.rag  # Reuses RAG image which has all dependencies
    container_name: hacklytics_test_runner
    environment:
      # PostgreSQL connection settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: hacklytics
      POSTGRES_PASSWORD: hacklytics_dev
      POSTGRES_DB: hacklytics_rag
      # Actian settings (COMMENTED OUT - using PostgreSQL instead)
      # ACTIAN_HOST: host.docker.internal
      # ACTIAN_PORT: 50051
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag_network
    volumes:
      # Removed :ro flags - tests may need to write coverage reports
      - ./backend:/app/backend
      - ./tests:/app/tests
      - model_cache:/root/.cache/torch
    profiles:
      - test
    command: ["pytest", "tests/test_profiles/", "-v", "-s", "--tb=short"]
    # Resource limits for test runner
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  rag_network:
    driver: bridge
    name: hacklytics_rag_network

volumes:
  postgres_data:
    name: hacklytics_postgres_data
    driver: local
  # actian_data:  # COMMENTED OUT - using PostgreSQL instead
  #   name: hacklytics_actian_data
  #   driver: local
  redis_data:
    name: hacklytics_redis_data
    driver: local
  model_cache:
    name: hacklytics_model_cache
    driver: local
