version: '3.8'

services:
  # Actian VectorAI DB - gRPC-based vector storage for protocols and incident history
  vectoraidb:
    build:
      context: .
      dockerfile: Dockerfile.vectoraidb
    platform: linux/amd64   # Required on macOS with Apple Silicon
    container_name: hacklytics_vectoraidb
    ports:
      - "50051:50051"  # gRPC port (NOT PostgreSQL 5432)
    volumes:
      - actian_data:/data  # Collections and logs are persisted under /data
    networks:
      - rag_network
    restart: unless-stopped
    stop_grace_period: 2m  # Allow graceful shutdown for data persistence
    # Removed healthcheck because Actian VDE doesn't implement grpc.health.v1.Health
    # Resource limits to prevent runaway consumption
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # RAG Service - Embedding, retrieval, synthesis, incident logging
  rag:
    build:
      context: .
      dockerfile: Dockerfile.rag
    container_name: hacklytics_rag
    ports:
      - "8001:8001"
    environment:
      ACTIAN_HOST: vectoraidb  # Updated service name
      ACTIAN_PORT: 50051  # gRPC port (changed from 5432)
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      BATCH_FLUSH_INTERVAL: ${BATCH_FLUSH_INTERVAL:-2.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_URL: http://host.docker.internal:11434
    depends_on:
      vectoraidb:
        condition: service_started
    networks:
      - rag_network
    volumes:
      # Removed :ro flag - PYTHONDONTWRITEBYTECODE in Dockerfile prevents .pyc writes anyway
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - model_cache:/root/.cache/torch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # Higher for ML model
        reservations:
          cpus: '0.5'
          memory: 1G

  # Ingest Service - ZeroMQ subscriber, temporal buffer, WebSocket publisher
  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: hacklytics_ingest
    ports:
      - "8000:8000"
      - "5555:5555"
    environment:
      ACTIAN_HOST: vectoraidb
      ACTIAN_PORT: 50051
      ZMQ_BIND_ADDRESS: ${ZMQ_BIND_ADDRESS:-tcp://*:5555}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://rag:8001}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-8000}
      BUFFER_WINDOW_SECONDS: ${BUFFER_WINDOW_SECONDS:-10.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_URL: http://host.docker.internal:11434
    depends_on:
      rag:
        condition: service_healthy
    networks:
      - rag_network
    volumes:
      # Removed :ro flag - PYTHONDONTWRITEBYTECODE in Dockerfile prevents .pyc writes anyway
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Test Runner - Runs test profiles 1-7 inside containerized environment
  test:
    build:
      context: .
      dockerfile: Dockerfile.rag  # Reuses RAG image which has all dependencies
    container_name: hacklytics_test_runner
    environment:
      ACTIAN_HOST: vectoraidb  # Updated service name
      ACTIAN_PORT: 50051  # gRPC port (changed from 5432)
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      PYTHONPATH: /app
    depends_on:
      vectoraidb:
        condition: service_started
    networks:
      - rag_network
    volumes:
      # Removed :ro flags - tests may need to write coverage reports
      - ./backend:/app/backend
      - ./tests:/app/tests
      - model_cache:/root/.cache/torch
    profiles:
      - test
    command: ["pytest", "tests/test_profiles/", "-v", "-s", "--tb=short"]
    # Resource limits for test runner
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  rag_network:
    driver: bridge
    name: hacklytics_rag_network

volumes:
  actian_data:
    name: hacklytics_actian_data
    driver: local
  model_cache:
    name: hacklytics_model_cache
    driver: local
